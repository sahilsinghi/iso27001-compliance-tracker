<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="#2563eb"/>
  <text x="116" y="132" font-family="sans-serif" font-size="40" text-anchor="middle" fill="white">✓</text>

  <!-- Title -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">ISO 27001 Self-Check</text>

  <!-- Subtitle -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">ISO/IEC 27001:2022 Compliance Tracker</text>

  <!-- Stats row -->
  <rect x="80" y="340" width="220" height="100" rx="12" fill="#1e3a8a" fill-opacity="0.6"/>
  <text x="190" y="390" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#60a5fa" text-anchor="middle">93</text>
  <text x="190" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Controls</text>

  <rect x="320" y="340" width="220" height="100" rx="12" fill="#1e3a8a" fill-opacity="0.6"/>
  <text x="430" y="390" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#60a5fa" text-anchor="middle">4</text>
  <text x="430" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Themes</text>

  <rect x="560" y="340" width="280" height="100" rx="12" fill="#1e3a8a" fill-opacity="0.6"/>
  <text x="700" y="390" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#22c55e" text-anchor="middle">Stage-1</text>
  <text x="700" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Audit Readiness</text>

  <rect x="860" y="340" width="260" height="100" rx="12" fill="#1e3a8a" fill-opacity="0.6"/>
  <text x="990" y="390" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#60a5fa" text-anchor="middle">Privacy-First</text>
  <text x="990" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">100% Client-Side</text>

  <!-- Tags -->
  <text x="80" y="510" font-family="system-ui, sans-serif" font-size="22" fill="#475569">Free · Open Source · No account required · Built for Indian GRC teams</text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="24" fill="#2563eb">iso27001-compliance-tracker.vercel.app</text>
  <text x="1120" y="580" font-family="system-ui, sans-serif" font-size="20" fill="#475569" text-anchor="end">by Sahil Singhi</text>
</svg>
